<!DOCTYPE html>
<html>
<head>
    <title>Science Lab Simulation UI</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Science Lab Simulation UI</h1>

<div class="container">

    <!-- Lab Items -->
    <div class="panel">
        <h2>Lab Items</h2>

        <div class="item" draggable="true" ondragstart="drag(event)" id="beaker">🧪 Beaker</div>
        <div class="item" draggable="true" ondragstart="drag(event)" id="testtube">🧫 Test Tube</div>
        <div class="item" draggable="true" ondragstart="drag(event)" id="acid">🧴 Acid</div>
        <div class="item" draggable="true" ondragstart="drag(event)" id="base">⚗️ Base</div>
    </div>

    <!-- Experiment Area -->
    <div class="panel">
        <h2>Experiment Area</h2>

        <div class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)">
            Drop Here
        </div>

        <div class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)">
            Drop Here
        </div>
    </div>

</div>

<!-- JavaScript -->
<script>
function allowDrop(event) {
    event.preventDefault();
}

function drag(event) {
    event.dataTransfer.setData("text", event.target.id);
}

function drop(event) {
    event.preventDefault();
    var data = event.dataTransfer.getData("text");
    event.target.appendChild(document.getElementById(data));
}
</script>

</body>
</html>
